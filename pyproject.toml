[project]
name = "causalpype"
version = "0.0.1"
description = "Pipeline-based framework for causal inference"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "altair>=5.5.0",
    "causal-learn>=0.1.4.0",
    "datasets>=4.4.2",
    "dowhy>=0.12",
    "fastapi>=0.115.13",
    "fastexcel>=0.14.0",
    "flask>=3.1.0",
    "ipykernel>=6.29.5",
    "ipython>=9.0.2",
    "lingam>=1.9.1",
    "matplotlib>=3.10.1",
    "mkdocs>=1.6.1",
    "mkdocs-material>=9.6.18",
    "mlflow>=2.20.4",
    "nbformat>=5.10.4",
    "networkx>=3.4.2",
    "numpy>=2.1.3",
    "openpyxl>=3.1.5",
    "pandas>=2.2.3",
    "plotly>=6.1.2",
    "polars>=1.32.2",
    "psutil>=7.0.0",
    "pygraphviz>=1.14",
    "python-multipart>=0.0.20",
    "scikit-learn==1.5",
    "seaborn>=0.13.2",
    "strawberry-graphql>=0.275.2",
    "uvicorn>=0.34.3",
    "xgboost>=2.1.4",
]

[project.scripts]
causalpype = "causalpype.cli:main"

[project.optional-dependencies]
docs = [
    "mkdocs>=1.5.0",
    "mkdocs-material>=9.0.0",
    "mkdocstrings[python]>=0.24.0",
]

[build-system]
requires = ["hatchling >= 1.26"]
build-backend = "hatchling.build"

[tool.setuptools]
py-modules = ["causalpype"]

[[tool.uv.index]]
name = "testpypi"
url = "https://test.pypi.org/simple/"
publish-url = "https://test.pypi.org/legacy/"
explicit = true
