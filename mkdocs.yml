site_name: CausalPype
site_description: A pipeline framework for causal inference
site_author: Your Name
site_url: https://palimisis.github.io/causalpype

repo_name: palimisis/causalpype
repo_url: https://github.com/palimisis/causalpype

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
  - User Guide:
      - Core Concepts: guide/concepts.md
      - Pipeline Configuration: guide/configuration.md
      - Built-in Steps: guide/steps.md
      - Custom Steps: guide/custom-steps.md
  - API Reference:
      - Pipeline: api/pipeline.md
      - Steps: api/steps.md
      - Configuration: api/config.md
  - Examples:
      - Basic Pipeline: examples/basic.md
      - Custom Steps: examples/custom-steps.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
